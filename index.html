<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Zaib's Library</h1>
      <button id="new-book-button">New Book</button>
    </header>
    <main>
      <div class="form-overlay hidden">
        <form id="book-form">
          <input
            type="text"
            name="title"
            id="title"
            placeholder="Title"
            required
          />
          <input
            type="text"
            name="author"
            id="author"
            placeholder="Author"
            required
          />
          <input
            type="number"
            name="pages"
            id="pages"
            placeholder="Pages"
            required
          />

          <label for="read" class="checkbox-container">
            <input type="checkbox" name="read" id="read" />
            Read
          </label>

          <button type="submit" id="book-form-button">Add Book</button>
        </form>
      </div>
      <div class="library-container"></div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
